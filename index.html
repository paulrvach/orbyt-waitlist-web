<!doctype html>
<html lang="en" class="dark">
  <head>
    <script>
      (function () {
        try {
          var t = localStorage.getItem("theme");
          if (t === "light") {
            document.documentElement.classList.remove("dark");
          } else {
            document.documentElement.classList.add("dark");
          }
        } catch (e) {}
      })();
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Orbyt is a desktop app that gives you a team of AI agents to proactively manage deadlines, study flow, and campus life—built for students who want to win."
    />
    <meta name="theme-color" content="#006EFE" />
    <meta name="application-name" content="Orbyt" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Orbyt — Your academic weapon, assembled" />
    <meta
      property="og:description"
      content="Join the waitlist for Orbyt: proactive AI agents for Canvas, calendar, notes, and chat—local-first and student-built."
    />
    <meta property="og:site_name" content="Orbyt" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Orbyt — Your academic weapon, assembled" />
    <meta
      name="twitter:description"
      content="Join the waitlist for Orbyt: proactive AI agents for school and campus life."
    />
    <title>Orbyt — Waitlist</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
